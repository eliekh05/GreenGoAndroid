name: Build GreenGo APK

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 25
        uses: actions/setup-java@v5.2.0
        with:
          distribution: 'temurin'
          java-version: '25'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v5.0.2
        with:
          gradle-version: '9.4.1'

      - name: Validation
        uses: gradle/actions/wrapper-validation@v5

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      - name: Build release APK (unsigned)
        run: ./gradlew assembleRelease

      - name: SonarQube Scan
        uses: SonarSource/sonarqube-scan-action@v6
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

      - name: Sign and copy APK
        env:
          SIGNING_KEY: ${{ secrets.SIGNING_KEY }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_STORE_PASSWORD: ${{ secrets.KEY_STORE_PASSWORD }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          UNSIGNED=app/build/outputs/apk/release/app-release-unsigned.apk
          if [ -n "$SIGNING_KEY" ]; then
            echo "🔑 Signing APK..."
            echo "$SIGNING_KEY" | base64 -d > keystore.jks
            APKSIGNER=$(find $ANDROID_SDK_ROOT/build-tools -name apksigner | sort -V | tail -1)
            "$APKSIGNER" sign \
              --ks keystore.jks \
              --ks-key-alias "$KEY_ALIAS" \
              --ks-pass pass:"$KEY_STORE_PASSWORD" \
              --key-pass pass:"$KEY_PASSWORD" \
              --out GreenGo.apk \
              "$UNSIGNED"
            rm -f keystore.jks
            echo "✅ Signed APK ready"
          else
            cp "$UNSIGNED" GreenGo.apk
            echo "⚠️ No signing key — using unsigned APK"
          fi

      - name: Verify APK exists
        run: test -f GreenGo.apk && echo "APK ready" || (echo "APK missing" && exit 1)

      - name: Publish to GitHub Releases
        if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v1.0.${{ github.run_number }}
          name: GreenGo v1.0.${{ github.run_number }}
          files: GreenGo.apk
          body: |
            Download **GreenGo.apk** below, transfer to your Android phone, and tap to install.
            Allow "Install from unknown sources" if prompted.
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
