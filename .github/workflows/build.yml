name: Build GreenGo APK

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 25
        uses: actions/setup-java@v5.2.0
        with:
          distribution: 'temurin'
          java-version: '25'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v5.0.2
        with:
          gradle-version: '9.4.1'

      - name: Validation
        uses: gradle/actions/wrapper-validation@v5

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      - name: Build release APK (unsigned)
        run: ./gradlew assembleRelease

      - name: SonarQube Scan
        uses: SonarSource/sonarqube-scan-action@v6
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

      - name: Setup Android SDK Tools
        uses: android-actions/setup-android@v3.2.2

      - name: Android platform tools
        run: |
         sdkmanager tools platform-tools

      - name: Sign app APK
        id: sign_app
        if: ${{ secrets.SIGNING_KEY != '' }}
        uses: ilharp/sign-android-release@v2
        with:
          releaseDir: app/build/outputs/apk/release
          signingKey: ${{ secrets.SIGNING_KEY }}
          keyAlias: ${{ secrets.KEY_ALIAS }}
          keyStorePassword: ${{ secrets.KEY_STORE_PASSWORD }}
          keyPassword: ${{ secrets.KEY_PASSWORD }}
          buildToolsVersion: 36.0.0

      - name: Copy signed APK
        if: ${{ secrets.SIGNING_KEY != '' }}
        run: |
          cp "${{ steps.sign_app.outputs.signedReleaseFile }}" GreenGo.apk
          echo "Using signed APK: ${{ steps.sign_app.outputs.signedReleaseFile }}"

      - name: Copy unsigned APK
        if: ${{ secrets.SIGNING_KEY == '' }}
        run: |
          cp app/build/outputs/apk/release/app-release-unsigned.apk GreenGo.apk
          echo "Using unsigned APK (no signing secrets set)"

      - name: Verify APK exists
        run: test -f GreenGo.apk && echo "APK ready" || (echo "APK missing" && exit 1)

      - name: Publish to GitHub Releases
        if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v1.0.${{ github.run_number }}
          name: GreenGo v1.0.${{ github.run_number }}
          files: GreenGo.apk
          body: |
            Download **GreenGo.apk** below, transfer to your Android phone, and tap to install.
            Allow "Install from unknown sources" if prompted.
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
