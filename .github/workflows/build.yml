name: Build GreenGo APK

on:
  push:
    branches: [ main, master ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
          cache: gradle

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      # 🔐 Decode the keystore
      - name: Decode keystore
        run: echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > greengo.keystore

      # 🔨 Build signed release APK
      - name: Build release APK
        run: ./gradlew assembleRelease --no-daemon
        env:
          RELEASE_STORE_FILE: greengo.keystore
          RELEASE_STORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          RELEASE_KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          RELEASE_KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}

      # ✅ Rename APK
      - name: Rename APK
        run: cp app/build/outputs/apk/release/app-release.apk GreenGo.apk

      - name: Verify APK exists
        run: test -f GreenGo.apk

      # 🗂 Upload as artifact so you can download & test
      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: GreenGo APK
          path: GreenGo.apk

      # 🏷 Optional: Create GitHub release automatically
      - name: Create Release
        if: github.ref == 'refs/heads/main'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v1.0.${{ github.run_number }}
          files: GreenGo.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}          RELEASE_STORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          RELEASE_KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          RELEASE_KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}

      # ✅ Use the CORRECT signed APK
      - name: Rename APK
        run: cp app/build/outputs/apk/release/app-release.apk GreenGo.apk

      - name: Verify APK exists
        run: test -f GreenGo.apk

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: GreenGo APK
          path: GreenGo.apk

      - name: Create Release
        if: github.ref == 'refs/heads/main'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v1.0.${{ github.run_number }}
          files: GreenGo.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
