name: Build GreenGo APK

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 25
        uses: actions/setup-java@v5.2.0
        with:
          distribution: 'temurin'
          java-version: '25'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v5.0.2
        with:
          gradle-version: '9.4.1'

      - name: Validation
        uses: gradle/actions/wrapper-validation@v5

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      - name: SonarQube Scan
        uses: SonarSource/sonarqube-scan-action@v6
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

      - name: Build release APK (unsigned)
        run: ./gradlew assembleRelease

      - name: Sign APK
        uses: r0adkll/sign-android-release@v1
        id: sign_app
        with:
          releaseDirectory: app/build/outputs/apk/release
          signingKeyBase64: ${{ secrets.SIGNING_KEY }}
          alias: ${{ secrets.KEY_ALIAS }}
          keyStorePassword: ${{ secrets.KEY_STORE_PASSWORD }}
          keyPassword: ${{ secrets.KEY_PASSWORD }}
        env:
          BUILD_TOOLS_VERSION: "34.0.0"

      - name: Rename signed APK
        run: cp ${{ steps.sign_app.outputs.signedReleaseFile }} GreenGo.apk

      - name: Verify APK exists
        run: test -f GreenGo.apk && echo "APK ready" || (echo "APK missing" && exit 1)

      - name: Publish to GitHub Releases
        if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v1.0.${{ github.run_number }}
          name: GreenGo v1.0.${{ github.run_number }}
          files: GreenGo.apk
          body: |
            Download **GreenGo.apk** below, transfer to your Android phone, and tap to install.
            Allow "Install from unknown sources" if prompted.
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
